name: Demo Workflow
permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  render-all-files:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Render All Files
        uses: cbrgm/structuresmith@5b58010b474ae2341f6ec22bb87f94a5fe55dd1b # main
        with:
          # required
          project: example/repo1
          # optional
          config: ./anvil.yml
          output: ./out
          templates: ./templates
